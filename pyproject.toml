[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
    ".cache",
    ".npm-cache",
    ".pytest_cache",
    "data",
    "saida",
    "venv",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
